global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'warehouse-alert-processor'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['warehouse-alert-processor:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'alert-processor'

  - job_name: 'warehouse-producer'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['warehouse-producer:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'producer'

  - job_name: 'warehouse-dashboard'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['warehouse-dashboard:8083']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'dashboard'
